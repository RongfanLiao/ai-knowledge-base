# ============================================================
# AI 知识库 V4 — Docker Compose 编排
# ============================================================
# 两个容器服务：
#   pipeline  — 定时采集分析流水线（cron 触发）
#   bot       — 交互式知识库机器人（常驻运行）
#
# OpenClaw 网关不在 Compose 中——它是 Node CLI，直接装在宿主机：
#   npm install -g openclaw@latest
#   openclaw daemon start
# 详见 RUN.md §5。Compose 里的 pipeline/bot 通过挂载同一个
# knowledge/ 卷与 host 上的 openclaw 共享数据。
# ============================================================

version: "3.9"

services:
  # ----------------------------------------------------------
  # 流水线服务 — 定时执行采集→分析→整理→发布
  # ----------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-pipeline
    restart: unless-stopped
    user: root
    command: >
      sh -c "
        env | grep -E '^(LLM_|GITHUB_|TELEGRAM_|FEISHU_|PLANNER_|PRICE_|TZ=|PYTHONPATH=)' > /app/.cronenv &&
        echo '0 8 * * * . /app/.cronenv; cd /app && python -m pipeline.pipeline >> /app/data/pipeline.log 2>&1' > /tmp/crontab &&
        echo '0 20 * * * . /app/.cronenv; cd /app && python -m pipeline.pipeline >> /app/data/pipeline.log 2>&1' >> /tmp/crontab &&
        crontab /tmp/crontab &&
        cron -f
      "
    volumes:
      - knowledge-data:/app/knowledge
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - PYTHONPATH=/app
    networks:
      - kb-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # 机器人服务 — 交互式知识库问答（常驻）
  # ----------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-bot
    restart: unless-stopped
    command: ["python", "-m", "bot.knowledge_bot"]
    volumes:
      - knowledge-data:/app/knowledge
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - PYTHONPATH=/app
    depends_on:
      - pipeline
    networks:
      - kb-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # 飞书交互机器人 — 接收飞书事件回调，双向互动
  # ----------------------------------------------------------
  feishu-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-feishu-bot
    restart: unless-stopped
    command: ["python", "-m", "bot.feishu_server"]
    ports:
      - "${FEISHU_BOT_PORT:-9000}:9000"
    volumes:
      - knowledge-data:/app/knowledge
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - PYTHONPATH=/app
    depends_on:
      - pipeline
    networks:
      - kb-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  knowledge-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./knowledge
  app-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

# ============================================================
# 网络
# ============================================================
networks:
  kb-network:
    driver: bridge
